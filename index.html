<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>標點符號黃金礦工</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* 天空藍 */
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            touch-action: none; /* 防止移動端滑動 */
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(to bottom, #87CEEB 30%, #8B4513 30%); /* 天空與泥土 */
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 頂部 UI */
        #top-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .status-box {
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid #FFD700;
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 20px;
            font-weight: 900;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #question-box {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #FFF8DC;
            border: 4px solid #FFA500;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: 900;
            color: #D2691E;
            text-align: center;
            width: 85%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 10;
        }

        .highlight {
            color: #FF4500;
            font-size: 1.2em;
            background-color: rgba(255, 215, 0, 0.3);
            padding: 0 5px;
            border-radius: 5px;
        }

        /* 彈窗 UI */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.3s;
        }

        .modal-content {
            background-color: #FFF;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 6px solid #FFD700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 80%;
        }

        .modal h1 {
            color: #FF4500;
            font-size: 36px;
            margin-top: 0;
            text-shadow: 2px 2px 0px #FFD700;
        }

        .modal p {
            font-size: 20px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: bold;
        }

        button {
            background-color: #32CD32;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #228B22;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #228B22;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            #question-box { font-size: 18px; top: 80px; padding: 10px 15px; }
            .status-box { font-size: 16px; padding: 5px 10px; }
            .modal h1 { font-size: 28px; }
            button { font-size: 20px; padding: 10px 30px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-ui">
        <div class="status-box">分數: <span id="score">0</span></div>
        <button id="music-toggle" onclick="toggleMusic()"
                style="pointer-events:auto; font-size:15px; padding:8px 14px; border-radius:20px;
                       background:#6A5ACD; box-shadow:0 4px 0 #483D8B; color:white; border:none;
                       font-weight:900; cursor:pointer; font-family:inherit;">
            🔇 音樂
        </button>
        <div class="status-box">時間: <span id="time">60</span>s</div>
    </div>
    
    <div id="question-box">
        <span id="question-text">準備開始...</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="modal">
        <div class="modal-content">
            <h1>標點符號黃金礦工</h1>
            <p>幫助小礦工找回遺失的標點符號吧！<br>
            點擊畫面發射鉤子。<br>
            抓對符號加 10 分，抓錯扣 5 分喔！</p>
            <button onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <div id="game-over-screen" class="modal hidden">
        <div class="modal-content">
            <h1>時間到！</h1>
            <p>你的最終分數是：<span id="final-score" style="font-size: 32px; color: #FF4500;">0</span> 分</p>
            <button onclick="startGame()">再玩一次</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const questionEl = document.getElementById('question-text');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');

    const questionBank = [
        { text: "媽媽買了蘋果( )橙和香蕉。", answer: "、" },
        { text: "請問這班巴士會途經哪裡( )", answer: "？" },
        { text: "嘩( )這裡的風景真美麗！", answer: "！" },
        { text: "老師說( )「各位同學，準備上課了。」", answer: "：" },
        { text: "小明說：( )這本書真好看。( )", answer: "「」" },
        { text: "我今天做完了所有功課( )", answer: "。" },
        { text: "放學後，我和同學一起去圖書館( )然後才回家。", answer: "，" }
    ];

    const allPunctuation = ["，", "。", "？", "！", "、", "：", "「」"];
    const colors = ['#FF6347', '#FFD700', '#7CFC00', '#00BFFF', '#EE82EE', '#FF69B4', '#FFA500'];

    let score = 0;
    let timeLeft = 60;
    let gameInterval;
    let animationId;
    let gameState = 'START'; 
    let currentQuestion = null;
    let floatingTexts = [];
    let items = [];
    let dustParticles = [];
    let parallaxTick = 0;

    const hook = {
        x: 0, y: 0, angle: 0, length: 20, maxLength: 800,
        state: 'SWINGING',
        swingSpeed: 0.008, swingDirection: 1,
        shootSpeed: 7, baseReelSpeed: 8, reelSpeed: 8,
        caughtItem: null, caughtStatus: null
    };

    // 圖片載入（後備：若圖片未就緒則用原有 Canvas 繪圖）
    const bgImage = new Image();
    const minerImage = new Image();
    let bgImageReady = false;
    let minerImageReady = false;
    bgImage.onload = () => { bgImageReady = true; };
    bgImage.onerror = () => { bgImageReady = false; };
    minerImage.onload = () => { minerImageReady = true; };
    minerImage.onerror = () => { minerImageReady = false; };
    bgImage.src = 'images/bg.png';
    minerImage.src = 'images/miner.png';

    // Web Audio API 音效系統（延遲初始化，符合瀏覽器自動播放限制）
    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playCorrectSound() {
        const ac = getAudioCtx();
        [523.25, 659.25, 783.99].forEach((freq, i) => {
            const osc = ac.createOscillator(), gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.12);
            gain.gain.setValueAtTime(0.4, ac.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.12 + 0.25);
            osc.start(ac.currentTime + i * 0.12);
            osc.stop(ac.currentTime + i * 0.12 + 0.25);
        });
    }

    function playWrongSound() {
        const ac = getAudioCtx();
        const osc = ac.createOscillator(), gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.4);
        gain.gain.setValueAtTime(0.3, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
    }

    function playShootSound() {
        const ac = getAudioCtx();
        const osc = ac.createOscillator(), filter = ac.createBiquadFilter(), gain = ac.createGain();
        osc.connect(filter); filter.connect(gain); gain.connect(ac.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.15);
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(600, ac.currentTime);
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.15);
    }

    // 背景音樂（五聲音階循環旋律）
    let musicInterval = null, musicEnabled = false, musicStep = 0;
    const melodyNotes = [293.66, 329.63, 392.00, 440.00, 523.25]; // D4 E4 G4 A4 C5
    const melodyPattern = [0, 2, 3, 4, 3, 2, 0, -1]; // -1 = 休止

    function playMelodyStep() {
        const ac = getAudioCtx();
        const noteIndex = melodyPattern[musicStep++ % melodyPattern.length];
        if (noteIndex === -1) return;
        const osc = ac.createOscillator(), gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(melodyNotes[noteIndex], ac.currentTime);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.2);
    }

    function startMusic() {
        if (musicInterval) return;
        musicStep = 0; playMelodyStep();
        musicInterval = setInterval(playMelodyStep, 250);
    }
    function stopMusic() { clearInterval(musicInterval); musicInterval = null; }
    function toggleMusic() {
        musicEnabled = !musicEnabled;
        document.getElementById('music-toggle').textContent = musicEnabled ? '🔊 音樂' : '🔇 音樂';
        musicEnabled ? startMusic() : stopMusic();
    }

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        hook.x = canvas.width / 2;
        hook.y = canvas.height * 0.3; 
        hook.maxLength = Math.hypot(canvas.width, canvas.height);
        resetDustParticles();
    }
    window.addEventListener('resize', resizeCanvas);

    // 【改良版】智能產生關卡物品，防止正確答案被遮擋
    function generateLevel() {
        currentQuestion = questionBank[Math.floor(Math.random() * questionBank.length)];
        questionEl.innerHTML = currentQuestion.text.replace('( )', '<span class="highlight">( ? )</span>');

        items = [];
        const startY = canvas.height * 0.45; // 泥土區起點
        const endY = canvas.height - 60;     // 底部邊界
        const startX = 60;
        const endX = canvas.width - 60;

        // 1. 優先放置「正確答案」
        let targetPunc = currentQuestion.answer;
        let targetRadius = targetPunc.length > 1 ? 40 : 30;
        
        // 將正確答案放在比較中下的位置，但不要太貼底，增加遊戲性
        let targetX = startX + Math.random() * (endX - startX);
        let targetY = startY + (Math.random() * 0.7 + 0.1) * (endY - startY); 

        let targetItem = {
            x: targetX, y: targetY, radius: targetRadius, text: targetPunc,
            color: colors[Math.floor(Math.random() * colors.length)], isTarget: true
        };
        items.push(targetItem);

        // 用於計算阻擋：直線方程式 Ax + By + C = 0 (通過 hook 和 target)
        // 確保這條抓取路徑上沒有其他障礙物
        let A = targetY - hook.y;
        let B = -(targetX - hook.x);
        let C = targetX * hook.y - targetY * hook.x;
        let lineLength = Math.hypot(A, B);

        // 2. 生成「干擾項」
        let levelItems = [];
        while (levelItems.length < 6) { // 總共 7 個物品，畫面比較寬鬆
            let randomPunc = allPunctuation[Math.floor(Math.random() * allPunctuation.length)];
            levelItems.push(randomPunc);
        }
        
        levelItems.forEach(punc => {
            let validPosition = false;
            let itemX, itemY;
            let attempts = 0;
            let radius = punc.length > 1 ? 40 : 30;
            
            while (!validPosition && attempts < 100) {
                itemX = startX + Math.random() * (endX - startX);
                itemY = startY + Math.random() * (endY - startY);
                validPosition = true;
                
                // 檢查 1：與其他物品保持距離，防止重疊
                for (let existing of items) {
                    const dist = Math.hypot(itemX - existing.x, itemY - existing.y);
                    if (dist < radius + existing.radius + 15) { 
                        validPosition = false;
                        break;
                    }
                }

                // 檢查 2：防阻擋機制 (如果這個物品在目標的上方，且靠瞄準線太近)
                if (validPosition && itemY < targetItem.y) {
                    // 計算此點到「瞄準線」的最短垂直距離
                    let distanceToLine = Math.abs(A * itemX + B * itemY + C) / lineLength;
                    
                    // 如果距離小於 (半徑 + 25px的寬鬆通道)，代表它擋住了正確答案！
                    // 必須重新生成位置
                    if (distanceToLine < radius + 25) {
                        validPosition = false;
                    }
                }
                attempts++;
            }

            items.push({
                x: itemX, y: itemY, radius: radius, text: punc,
                color: colors[Math.floor(Math.random() * colors.length)], isTarget: false
            });
        });

        // 隨機打亂繪製順序，讓層級看起來更自然
        items.sort(() => Math.random() - 0.5);
    }

    function gameLoop() {
        if (gameState !== 'PLAYING') return;
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function resetDustParticles() {
        const soilTop = canvas.height * 0.45;
        const particleCount = Math.max(8, Math.round((canvas.width / 1200) * 20));
        dustParticles = Array.from({ length: particleCount }, () => ({
            x: Math.random() * canvas.width,
            y: soilTop + Math.random() * (canvas.height - soilTop),
            vx: (Math.random() - 0.5) * 0.12,
            vy: -0.03 - Math.random() * 0.08,
            radius: 0.8 + Math.random() * 1.8,
            alpha: 0.05 + Math.random() * 0.08,
            phase: Math.random() * Math.PI * 2
        }));
    }

    function updateDustParticles() {
        const soilTop = canvas.height * 0.45;
        for (const p of dustParticles) {
            p.phase += 0.02;
            p.x += p.vx + Math.sin(p.phase) * 0.05;
            p.y += p.vy;

            if (p.x < -5) p.x = canvas.width + 5;
            if (p.x > canvas.width + 5) p.x = -5;
            if (p.y < soilTop - 5) {
                p.y = canvas.height + Math.random() * 16;
                p.x = Math.random() * canvas.width;
            }
        }
    }

    function drawFallbackBackground() {
        const soilTop = canvas.height * 0.45;

        const sky = ctx.createLinearGradient(0, 0, 0, soilTop);
        sky.addColorStop(0, '#86d8ff');
        sky.addColorStop(0.55, '#9fe2ff');
        sky.addColorStop(1, '#d8eef8');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, soilTop);

        const haze = ctx.createLinearGradient(0, soilTop - 70, 0, soilTop + 28);
        haze.addColorStop(0, 'rgba(255,255,255,0)');
        haze.addColorStop(0.6, 'rgba(244,243,235,0.35)');
        haze.addColorStop(1, 'rgba(220,200,170,0.12)');
        ctx.fillStyle = haze;
        ctx.fillRect(0, soilTop - 70, canvas.width, 100);

        const soil = ctx.createLinearGradient(0, soilTop, 0, canvas.height);
        soil.addColorStop(0, '#9a5f34');
        soil.addColorStop(0.45, '#7d4a28');
        soil.addColorStop(1, '#5e351d');
        ctx.fillStyle = soil;
        ctx.fillRect(0, soilTop, canvas.width, canvas.height - soilTop);

        ctx.strokeStyle = 'rgba(65, 34, 19, 0.18)';
        ctx.lineWidth = 2;
        for (let y = soilTop + 14; y < canvas.height; y += 18) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y + Math.sin(y * 0.04) * 3);
            ctx.stroke();
        }
    }

    function drawMidgroundLayer() {
        const soilTop = canvas.height * 0.45;
        const offset = (parallaxTick * 0.22) % (canvas.width + 220);

        // 遠山輪廓（低透明）
        ctx.fillStyle = 'rgba(84, 118, 134, 0.12)';
        ctx.beginPath();
        ctx.moveTo(0, soilTop + 12);
        ctx.lineTo(canvas.width * 0.15, soilTop - 22);
        ctx.lineTo(canvas.width * 0.36, soilTop + 8);
        ctx.lineTo(canvas.width * 0.56, soilTop - 18);
        ctx.lineTo(canvas.width * 0.74, soilTop + 9);
        ctx.lineTo(canvas.width, soilTop - 10);
        ctx.lineTo(canvas.width, soilTop + 42);
        ctx.lineTo(0, soilTop + 42);
        ctx.closePath();
        ctx.fill();

        // 雲朵平移（簡單視差）
        const cloudY = soilTop * 0.42;
        const cloudSpacing = 220;
        for (let i = -1; i < 5; i++) {
            const x = i * cloudSpacing + offset - 110;
            ctx.fillStyle = 'rgba(255,255,255,0.14)';
            ctx.beginPath();
            ctx.ellipse(x, cloudY + (i % 2) * 12, 44, 16, 0, 0, Math.PI * 2);
            ctx.ellipse(x + 28, cloudY + 2 + (i % 2) * 12, 36, 14, 0, 0, Math.PI * 2);
            ctx.ellipse(x - 26, cloudY + 4 + (i % 2) * 12, 30, 12, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawForegroundDust() {
        ctx.fillStyle = '#f8ead9';
        for (const p of dustParticles) {
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function update() {
        parallaxTick += 1;
        updateDustParticles();

        if (hook.state === 'SWINGING') {
            hook.angle += hook.swingSpeed * hook.swingDirection;
            if (hook.angle > Math.PI * 0.4) {
                hook.angle = Math.PI * 0.4; hook.swingDirection = -1;
            } else if (hook.angle < -Math.PI * 0.4) {
                hook.angle = -Math.PI * 0.4; hook.swingDirection = 1;
            }
        } 
        else if (hook.state === 'SHOOTING') {
            hook.length += hook.shootSpeed;
            const tipX = hook.x + hook.length * Math.sin(hook.angle);
            const tipY = hook.y + hook.length * Math.cos(hook.angle);

            if (tipX < 0 || tipX > canvas.width || tipY > canvas.height) {
                hook.state = 'REELING';
                hook.reelSpeed = hook.baseReelSpeed; 
            }

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const dist = Math.hypot(tipX - item.x, tipY - item.y);
                if (dist < item.radius) {
                    hook.caughtItem = item;
                    items.splice(i, 1); 
                    hook.state = 'REELING';
                    
                    if (item.text === currentQuestion.answer) {
                        hook.reelSpeed = hook.baseReelSpeed * 1.5; 
                        hook.caughtStatus = 'correct';
                    } else {
                        hook.reelSpeed = hook.baseReelSpeed * 0.3; 
                        hook.caughtStatus = 'wrong';
                    }
                    break;
                }
            }
        }
        else if (hook.state === 'REELING') {
            hook.length -= hook.reelSpeed;
            if (hook.caughtItem) {
                hook.caughtItem.x = hook.x + hook.length * Math.sin(hook.angle);
                hook.caughtItem.y = hook.y + hook.length * Math.cos(hook.angle);
            }

            if (hook.length <= 20) {
                hook.length = 20;
                hook.state = 'SWINGING';
                
                if (hook.caughtItem) {
                    handleCaughtItem(hook.caughtItem, hook.caughtStatus);
                    hook.caughtItem = null;
                    hook.caughtStatus = null;
                }
            }
        }

        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 2; ft.alpha -= 0.02;
            if (ft.alpha <= 0) floatingTexts.splice(i, 1);
        }
    }

    function handleCaughtItem(item, status) {
        if (status === 'correct') {
            score += 10;
            playCorrectSound();
            createFloatingText("答對了！ +10", hook.x, hook.y - 20, "#32CD32");
            setTimeout(generateLevel, 300); // 延遲一下讓玩家看清楚加分
        } else {
            score -= 5;
            playWrongSound();
            createFloatingText("答錯了！ -5", hook.x, hook.y - 20, "#FF0000");
            if(items.length < 3) generateLevel();
        }
        scoreEl.innerText = score;
    }

    function createFloatingText(text, x, y, color) {
        floatingTexts.push({ text: text, x: x, y: y, color: color, alpha: 1 });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景層：先畫 fallback 漸層，再嘗試覆蓋背景圖
        drawFallbackBackground();
        if (bgImageReady) {
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        }
        // 中景層：遠山/雲朵低透明視差
        drawMidgroundLayer();

        // 礦工角色（若已載入則用圖片，否則用原有 Canvas 形狀後備）
        if (minerImageReady) {
            const mW = 80, mH = 100;
            ctx.drawImage(minerImage, hook.x - mW / 2, hook.y - mH, mW, mH);
        } else {
            // 後備：原有 canvas 原始形狀
            ctx.fillStyle = "#A0522D";
            ctx.beginPath();
            ctx.arc(hook.x, hook.y, 30, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = "#FFA07A";
            ctx.beginPath(); ctx.arc(hook.x, hook.y - 25, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#FFD700";
            ctx.beginPath(); ctx.arc(hook.x, hook.y - 28, 16, Math.PI, 0); ctx.fill();
        }

        // 繩子
        const tipX = hook.x + hook.length * Math.sin(hook.angle);
        const tipY = hook.y + hook.length * Math.cos(hook.angle);
        ctx.strokeStyle = "#555"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(hook.x, hook.y); ctx.lineTo(tipX, tipY); ctx.stroke();

        // 鉤爪
        ctx.save();
        ctx.translate(tipX, tipY);
        ctx.rotate(-hook.angle);
        ctx.strokeStyle = "#C0C0C0"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(20, -10); ctx.moveTo(-15, 0); ctx.lineTo(-20, -10); ctx.stroke();
        ctx.restore();

        if (hook.caughtItem) drawItem(hook.caughtItem);
        items.forEach(drawItem);
        // 前景層：泥土上的輕微漂浮塵埃
        drawForegroundDust();

        floatingTexts.forEach(ft => {
            ctx.fillStyle = `rgba(${hexToRgb(ft.color)}, ${ft.alpha})`;
            ctx.font = "900 28px 'Nunito', 'Microsoft JhengHei'";
            ctx.textAlign = "center";
            // 白邊增加可讀性
            ctx.strokeStyle = "rgba(255,255,255," + ft.alpha + ")";
            ctx.lineWidth = 4;
            ctx.strokeText(ft.text, ft.x, ft.y);
            ctx.fillText(ft.text, ft.x, ft.y);
        });
    }

    function drawItem(item) {
        ctx.save();
        ctx.translate(item.x, item.y);

        const gradient = ctx.createRadialGradient(-item.radius/3, -item.radius/3, item.radius/10, 0, 0, item.radius);
        gradient.addColorStop(0, '#FFFFFF');
        gradient.addColorStop(0.3, item.color);
        gradient.addColorStop(1, shadeColor(item.color, -30));

        ctx.fillStyle = gradient;
        ctx.beginPath();
        if(item.text.length > 1) { 
            ctx.ellipse(0, 0, item.radius, item.radius * 0.7, 0, 0, Math.PI*2);
        } else {
            ctx.arc(0, 0, item.radius, 0, Math.PI*2);
        }
        ctx.fill();
        
        ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 3; ctx.stroke();

        ctx.fillStyle = "#FFFFFF";
        ctx.font = `900 ${item.radius}px 'Microsoft JhengHei'`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        
        let yOffset = 0;
        if(item.text === "，" || item.text === "。") yOffset = -item.radius*0.2; 
        
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
        ctx.fillText(item.text, 0, yOffset);

        ctx.restore();
    }

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
    }

    function shadeColor(color, percent) {
        let R = parseInt(color.substring(1,3),16);
        let G = parseInt(color.substring(3,5),16);
        let B = parseInt(color.substring(5,7),16);
        R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100);
        R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;  
        let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
        let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
        let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
        return "#"+RR+GG+BB;
    }

    canvas.addEventListener('mousedown', shoot);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); }, {passive: false});

    function shoot() {
        if (gameState === 'PLAYING' && hook.state === 'SWINGING') {
            hook.state = 'SHOOTING';
            playShootSound();
        }
    }

    function startGame() {
        resizeCanvas();
        score = 0; timeLeft = 60;
        scoreEl.innerText = score; timeEl.innerText = timeLeft;
        hook.state = 'SWINGING'; hook.length = 20; hook.caughtItem = null;
        floatingTexts = [];
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        generateLevel();
        gameState = 'PLAYING';
        if (musicEnabled) startMusic();

        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();

        clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            if (gameState === 'PLAYING') {
                timeLeft--;
                timeEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function endGame() {
        gameState = 'GAMEOVER';
        stopMusic();
        clearInterval(gameInterval);
        finalScoreEl.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    window.onload = resizeCanvas;
</script>
</body>
</html>
